<section id="heatmap" class="section--settings section--collapsible">
	<div class="section__header">
		<h2>
			装订线热力图
			<a
				class="link__learn-more"
				title="了解更多"
				href="https://github.com/gitkraken/vscode-gitlens/#gutter-heatmap-"
			>
				<i class="icon icon__info"></i>
			</a>
		</h2>

		<p class="section__header-hint">
			按需在装订线边缘添加热力图（年龄）指示器，用于显示各行最近一次被修改的时间
		</p>
		<div class="section__header-info">
			<i class="icon icon--md icon__bulb"></i>
			<div>
				<p>
					使用
					<span class="command hidden" data-visibility="heatmap.toggleMode =file">
						GitLens: 切换文件热力图注解
					</span>
					<a
						class="command hidden"
						title="运行命令"
						href="command:gitlens.toggleFileHeatmap"
						data-visibility="heatmap.toggleMode =window"
					>
						GitLens: 切换文件热力图注解
					</a>
					命令来开启或关闭这些注解
				</p>
				<p>按 <kbd>Esc</kbd> 可关闭这些注解</p>
			</div>
		</div>
	</div>

	<div class="section__collapsible">
		<div class="section__group">
			<div class="section__content">
				<p class="setting__hint">
					<i class="icon icon__info"></i> 指示器颜色反映最近一次更改的时间（较新为暖色，较旧为冷色），亮度则根据相对时间从亮到暗变化
				</p>

				<div class="setting">
					<div class="setting__input">
						<label for="heatmap.toggleMode">切换注解 </label>
						<div class="select-container">
							<select id="heatmap.toggleMode" name="heatmap.toggleMode" data-setting>
								<option value="file">分别针对每个文件</option>
								<option value="window">针对所有文件</option>
							</select>
						</div>
					</div>
				</div>

				<div class="settings">
					<div class="setting">
						<div class="setting__input">
							<input
								id="heatmap.locations"
								name="heatmap.locations"
								type="checkbox"
								value="gutter"
								data-setting
								data-setting-type="array"
							/>
							<label for="heatmap.locations">添加装订线指示器</label>
						</div>
					</div>

					<div class="setting">
						<div class="setting__input">
							<input
								id="heatmap.locations-1"
								name="heatmap.locations"
								type="checkbox"
								value="overview"
								data-setting
								data-setting-type="array"
							/>
							<label for="heatmap.locations-1">添加滚动条指示器</label>
						</div>
					</div>
				</div>

				<div class="setting">
					<div class="setting__input">
						<label for="heatmap.ageThreshold">冷热阈值 </label>
						<input
							id="heatmap.ageThreshold"
							name="heatmap.ageThreshold"
							type="number"
							placeholder="90"
							data-setting
							data-default-value="90"
						/>
						<label for="heatmap.ageThreshold"> 天</label>
					</div>
				</div>
			</div>

			<div class="section__preview">
				<img class="image__preview" src="#{webroot}/media/heatmap.webp" loading="lazy" />
				<img
					class="image__preview--overlay hidden"
					src="#{webroot}/media/heatmap-gutter.webp"
					data-visibility="heatmap.locations +gutter"
					loading="lazy"
				/>
				<img
					class="image__preview--overlay hidden"
					src="#{webroot}/media/heatmap-scrollbar.webp"
					data-visibility="heatmap.locations +overview"
					loading="lazy"
				/>
			</div>
		</div>

		<div class="section__group">
			<p class="section__hint">
				<i class="icon icon__info"></i> 如需更多选项，打开
				<a
					class="command"
					title="打开设置"
					href="command:workbench.action.openSettings?%22gitlens.heatmap%22"
					>设置</a
				>
				并搜索 <b><i>gitlens.heatmap</i></b>
			</p>
		</div>
	</div>
</section>
