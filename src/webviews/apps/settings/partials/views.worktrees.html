<section id="worktrees-view" class="section--settings section--collapsible">
	<div class="section__header">
		<h2>
			工作树视图
			<a
				class="link__learn-more"
				title="了解更多"
				href="https://github.com/gitkraken/vscode-gitlens/#worktrees-view-"
			>
				<i class="icon icon__info"></i>
			</a>
		</h2>

		<p class="section__header-hint">
			添加一个
			<a class="command command--show-view" title="在侧边栏中显示视图" href="command:gitlens.showWorktreesView"
				>工作树视图</a
			>
			用于可视化、浏览和管理 Git 工作树
		</p>
	</div>

	<div class="section__collapsible">
		<div class="section__group">
			<div class="section__content">
				<div class="settings settings--fixed ml-1">
					<div class="setting">
						<div class="setting__input">
							<input
								id="worktrees.promptForLocation"
								name="worktrees.promptForLocation"
								type="checkbox"
								data-setting
							/>
							<label for="worktrees.promptForLocation">始终询问新工作树的放置位置</label>
						</div>
					</div>

					<div class="setting">
						<div class="setting__input">
							<label for="worktrees.defaultLocation">默认工作树位置</label>
							<input
								id="worktrees.defaultLocation"
								name="worktrees.defaultLocation"
								type="text"
								placeholder="放置新工作树的绝对路径"
								data-setting
							/>
						</div>
						<p class="setting__hint">
							<i class="icon icon__info"></i> 可按工作区或文件夹分别配置
						</p>
					</div>

					<div class="setting">
						<div class="setting__input">
							<input
								id="views.worktrees.showBranchComparison"
								name="views.worktrees.showBranchComparison"
								type="checkbox"
								value="branch"
								data-setting
							/>
							<label for="views.worktrees.showBranchComparison"
								>显示工作树分支与用户选择的引用（分支、标签等）的比较结果
							</label>
						</div>
					</div>

					<div class="section__group">
						<div class="section__content">
							<div class="settings settings--fixed">
								<div class="setting">
									<div class="setting__input">
										<input
											id="views.worktrees.pullRequests.enabled"
											name="views.worktrees.pullRequests.enabled"
											type="checkbox"
											data-setting
										/>
										<label for="views.worktrees.pullRequests.enabled"
											>显示关联的拉取请求</label
										>
									</div>
									<p class="setting__hint">
										需要连接到受支持的远程服务（如 GitHub）
									</p>
								</div>

								<div class="settings settings--fixed ml-2">
									<div class="setting" data-enablement="views.worktrees.pullRequests.enabled">
										<div class="setting__input">
											<input
												id="views.worktrees.pullRequests.showForBranches"
												name="views.worktrees.pullRequests.showForBranches"
												type="checkbox"
												data-setting
												disabled
											/>
											<label for="views.worktrees.pullRequests.showForBranches"
												>显示与工作树分支关联的拉取请求</label
											>
										</div>
									</div>

									<div class="setting" data-enablement="views.worktrees.pullRequests.enabled">
										<div class="setting__input">
											<input
												id="views.worktrees.pullRequests.showForCommits"
												name="views.worktrees.pullRequests.showForCommits"
												type="checkbox"
												data-setting
												disabled
											/>
											<label for="views.worktrees.pullRequests.showForCommits"
												>显示引入每次提交的拉取请求</label
											>
										</div>
									</div>
								</div>
							</div>
						</div>
					</div>

					<div class="setting">
						<div class="setting__input">
							<label for="views.worktrees.files.layout">文件布局</label>
							<div class="select-container">
								<select
									id="views.worktrees.files.layout"
									name="views.worktrees.files.layout"
									data-setting
								>
									<option value="auto">自动</option>
									<option value="list">列表</option>
									<option value="tree">树形</option>
								</select>
							</div>
						</div>
						<p class="setting__hint" data-visibility="views.worktrees.files.layout =auto">
							根据每一级嵌套中的文件数量自动选择最合适的布局
						</p>
					</div>

					<div class="setting">
						<div class="setting__input">
							<input
								id="views.worktrees.files.compact"
								name="views.worktrees.files.compact"
								type="checkbox"
								data-setting
							/>
							<label for="views.worktrees.files.compact">使用紧凑文件布局</label>
						</div>
						<p class="setting__hint">使用树形布局时压平不必要的嵌套层级</p>
					</div>

					<div class="setting">
						<div class="setting__input">
							<input
								id="views.worktrees.avatars"
								name="views.worktrees.avatars"
								type="checkbox"
								data-setting
							/>
							<label for="views.worktrees.avatars">使用作者头像</label>
						</div>
					</div>
				</div>
			</div>

			<div class="section__preview">
				<img
					class="image__preview hidden"
					src="#{webroot}/media/worktrees-view-compare+pr.webp"
					data-visibility="views.worktrees.showBranchComparison !false &amp; views.worktrees.pullRequests.enabled &amp; views.worktrees.pullRequests.showForBranches"
					loading="lazy"
				/>
				<img
					class="image__preview hidden"
					src="#{webroot}/media/worktrees-view-compare.webp"
					data-visibility="views.worktrees.showBranchComparison !false &amp; views.worktrees.pullRequests.enabled =false"
					loading="lazy"
				/>
				<img
					class="image__preview hidden"
					src="#{webroot}/media/worktrees-view-compare.webp"
					data-visibility="views.worktrees.showBranchComparison !false &amp; views.worktrees.pullRequests.enabled &amp; views.worktrees.pullRequests.showForBranches =false"
					loading="lazy"
				/>
				<img
					class="image__preview hidden"
					src="#{webroot}/media/worktrees-view-pr.webp"
					data-visibility="views.worktrees.showBranchComparison =false &amp; views.worktrees.pullRequests.enabled &amp; views.worktrees.pullRequests.showForBranches"
					loading="lazy"
				/>
				<img
					class="image__preview hidden"
					src="#{webroot}/media/worktrees-view.webp"
					data-visibility="views.worktrees.showBranchComparison =false &amp; views.worktrees.pullRequests.enabled =false"
					loading="lazy"
				/>
				<img
					class="image__preview hidden"
					src="#{webroot}/media/worktrees-view.webp"
					data-visibility="views.worktrees.showBranchComparison =false &amp; views.worktrees.pullRequests.enabled &amp; views.worktrees.pullRequests.showForBranches =false"
					loading="lazy"
				/>
			</div>
		</div>

		<div class="section__group">
			<p class="section__hint">
				<i class="icon icon__info"></i> 如需更多选项，打开
				<a
					class="command"
					title="打开设置"
					href="command:workbench.action.openSettings?%22gitlens.views.worktrees%22"
					>设置</a
				>
				并搜索 <b><i>gitlens.views.worktrees</i></b> 或
				<b><i>gitlens.views</i></b>
			</p>
		</div>
	</div>
</section>
