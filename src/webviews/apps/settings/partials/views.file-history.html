<section id="file-history-view" class="section--settings section--collapsible">
	<div class="section__header">
		<h2>
			文件历史视图
			<a
				class="link__learn-more"
				title="了解更多"
				href="https://github.com/gitkraken/vscode-gitlens/#file-history-view-"
			>
				<i class="icon icon__info"></i>
			</a>
		</h2>

		<p class="section__header-hint">
			添加一个
			<a
				class="command command--show-view"
				title="在侧边栏中显示视图"
				href="command:gitlens.showFileHistoryView"
				>文件历史视图</a
			>
			用于可视化、导航和探索当前文件、指定文件或文件夹的修订历史，或
			仅针对当前文件中选中的行
		</p>
	</div>

	<div class="section__collapsible">
		<div class="section__group">
			<div class="section__content">
				<div class="settings settings--fixed ml-1">
					<div class="setting">
						<div class="setting__input">
							<label for="views.fileHistory.files.layout"
								>文件布局（显示文件夹历史时）</label
							>
							<div class="select-container">
								<select
									id="views.fileHistory.files.layout"
									name="views.fileHistory.files.layout"
									data-setting
								>
									<option value="auto">自动</option>
									<option value="list">列表</option>
									<option value="tree">树形</option>
								</select>
							</div>
						</div>
						<p class="setting__hint" data-visibility="views.fileHistory.files.layout =auto">
							根据每一级嵌套中的文件数量自动选择最合适的布局
						</p>
					</div>

					<div class="setting">
						<div class="setting__input">
							<input
								id="views.fileHistory.files.compact"
								name="views.fileHistory.files.compact"
								type="checkbox"
								data-setting
							/>
							<label for="views.fileHistory.files.compact">使用紧凑文件布局</label>
						</div>
						<p class="setting__hint">使用树形布局时压平不必要的嵌套层级</p>
					</div>

					<div class="setting">
						<div class="setting__input">
							<input
								id="views.fileHistory.avatars"
								name="views.fileHistory.avatars"
								type="checkbox"
								data-setting
							/>
							<label for="views.fileHistory.avatars">使用作者头像</label>
						</div>
					</div>
				</div>
			</div>

			<div class="section__preview">
				<img class="image__preview" src="#{webroot}/media/file-history-view.webp" loading="lazy" />
				<img
					class="image__preview--overlay hidden"
					src="#{webroot}/media/file-history-view-avatars.webp"
					data-visibility="views.fileHistory.avatars"
					loading="lazy"
				/>
			</div>
		</div>

		<div class="section__group">
			<p class="section__hint">
				<i class="icon icon__info"></i> 如需更多选项，打开
				<a
					class="command"
					title="打开设置"
					href="command:workbench.action.openSettings?%22gitlens.views.fileHistory%22"
					>设置</a
				>
				并搜索 <b><i>gitlens.views.fileHistory</i></b> 或
				<b><i>gitlens.views</i></b>
			</p>
		</div>
	</div>
</section>
