<section id="line-history-view" class="section--settings section--collapsible">
	<div class="section__header">
		<h2>
			行历史视图
			<a
				class="link__learn-more"
				title="了解更多"
				href="https://github.com/gitkraken/vscode-gitlens/#line-history-view-"
			>
				<i class="icon icon__info"></i>
			</a>
		</h2>

		<p class="section__header-hint">
			添加一个默认隐藏的
			<a class="command command--show-view" title="在侧边栏中显示视图" href="command:gitlens.showLineHistoryView"
				>行历史视图</a
			>，用于可视化、导航和探索当前文件中所选行的修订历史
		</p>
	</div>

	<div class="section__collapsible">
		<div class="section__group">
			<div class="section__content">
				<div class="settings settings--fixed ml-1">
					<div class="setting">
						<div class="setting__input">
							<input
								id="views.lineHistory.avatars"
								name="views.lineHistory.avatars"
								type="checkbox"
								data-setting
								disabled
							/>
							<label for="views.lineHistory.avatars">使用作者头像</label>
						</div>
					</div>
				</div>
			</div>

			<div class="section__preview">
				<img class="image__preview" src="#{webroot}/media/line-history-view.webp" loading="lazy" />
				<img
					class="image__preview--overlay hidden"
					src="#{webroot}/media/line-history-view-avatars.webp"
					data-visibility="views.lineHistory.avatars"
					loading="lazy"
				/>
			</div>
		</div>

		<div class="section__group">
			<p class="section__hint">
				<i class="icon icon__info"></i> 如需更多选项，打开
				<a
					class="command"
					title="打开设置"
					href="command:workbench.action.openSettings?%22gitlens.views.lineHistory%22"
					>设置</a
				>
				并搜索 <b><i>gitlens.views.lineHistory</i></b> 或 <b><i>gitlens.views</i></b>
			</p>
		</div>
	</div>
</section>
