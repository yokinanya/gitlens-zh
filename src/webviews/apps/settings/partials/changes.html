<section id="changes" class="section--settings section--collapsible">
	<div class="section__header">
		<h2>
			装订线更改
			<a
				class="link__learn-more"
				title="了解更多"
				href="https://github.com/gitkraken/vscode-gitlens/#gutter-changes-"
			>
				<i class="icon icon__info"></i>
			</a>
		</h2>

		<p class="section__header-hint">
			按需添加装订线更改注解，用于高亮显示本地（未发布）更改，或最近一次提交中被修改的行
		</p>
		<div class="section__header-info">
			<i class="icon icon--md icon__bulb"></i>
			<div>
				<p>
					使用
					<span class="command hidden" data-visibility="changes.toggleMode =file">
						GitLens: 切换文件更改注解
					</span>
					<a
						class="command hidden"
						title="运行命令"
						href="command:gitlens.toggleFileChanges"
						data-visibility="changes.toggleMode =window"
					>
						GitLens: 切换文件更改注解
					</a>
					命令来开启或关闭这些注解
				</p>
				<p>按 <kbd>Esc</kbd> 可关闭这些注解</p>
			</div>
		</div>
	</div>

	<div class="section__collapsible">
		<div class="section__group">
			<div class="section__content">
				<div class="setting">
					<div class="setting__input">
						<label for="changes.toggleMode">切换注解 </label>
						<div class="select-container">
							<select id="changes.toggleMode" name="changes.toggleMode" data-setting>
								<option value="file">分别针对每个文件</option>
								<option value="window">针对所有文件</option>
							</select>
						</div>
					</div>
				</div>

				<div class="settings">
					<div class="setting">
						<div class="setting__input">
							<input
								id="changes.locations"
								name="changes.locations"
								type="checkbox"
								value="gutter"
								data-setting
								data-setting-type="array"
							/>
							<label for="changes.locations">添加装订线指示器</label>
						</div>
					</div>

					<div class="setting">
						<div class="setting__input">
							<input
								id="changes.locations-1"
								name="changes.locations"
								type="checkbox"
								value="overview"
								data-setting
								data-setting-type="array"
							/>
							<label for="changes.locations-1">添加滚动条指示器</label>
						</div>
					</div>
				</div>
			</div>

			<div class="section__preview">
				<img class="image__preview" src="#{webroot}/media/changes.webp" loading="lazy" />
				<img
					class="image__preview--overlay hidden"
					src="#{webroot}/media/changes-highlight-gutter.webp"
					data-visibility="changes.locations +gutter"
					loading="lazy"
				/>
				<img
					class="image__preview--overlay hidden"
					src="#{webroot}/media/changes-highlight-scrollbar.webp"
					data-visibility="changes.locations +overview"
					loading="lazy"
				/>
			</div>
		</div>

		<div class="section__group">
			<p class="section__hint">
				<i class="icon icon__info"></i> 如需更多选项，打开
				<a
					class="command"
					title="打开设置"
					href="command:workbench.action.openSettings?%22gitlens.changes%22"
					>设置</a
				>
				并搜索 <b><i>gitlens.changes</i></b>
			</p>
		</div>
	</div>
</section>
