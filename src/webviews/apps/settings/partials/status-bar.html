<section id="status-bar" class="section--settings section--collapsible">
	<div class="section__header">
		<div class="setting__input setting__input--big">
			<input id="statusBar.enabled" name="statusBar.enabled" type="checkbox" data-setting />
			<label for="statusBar.enabled">状态栏归属</label>
			<a
				class="link__learn-more"
				title="了解更多"
				href="https://github.com/gitkraken/vscode-gitlens/#status-bar-blame-"
			>
				<i class="icon icon__info"></i>
			</a>
		</div>

		<p class="section__header-hint">在状态栏中显示当前行的 Git 归属信息</p>
	</div>

	<div class="section__collapsible">
		<div class="section__group">
			<div class="section__content">
				<div class="settings settings--fixed ml-1">
					<div class="setting" data-enablement="statusBar.enabled">
						<div class="setting__input">
							<input
								id="statusBar.pullRequests.enabled"
								name="statusBar.pullRequests.enabled"
								type="checkbox"
								data-setting
								disabled
							/>
							<label for="statusBar.pullRequests.enabled"
								>显示引入该提交的拉取请求（如果有）</label
							>
						</div>

						<p class="setting__hint hidden" data-visibility="statusBar.pullRequests.enabled">
							<i class="icon icon__info"></i>需要连接到受支持的远程服务（例如 GitHub）
						</p>
					</div>

					<div class="setting" data-enablement="statusBar.enabled">
						<div class="setting__input setting__input--format">
							<label for="statusBar.format">注解格式</label>
							<input
								id="statusBar.format"
								name="statusBar.format"
								type="text"
								placeholder="${author}, ${agoOrDate}${' via 'pullRequest}"
								data-setting
								data-setting-preview
								data-default-value="${author}, ${agoOrDate}${' via 'pullRequest}"
								data-popup-trigger
								disabled
							/>
							<label for="statusBar.format" title="查看可用标记">
								<i class="icon icon__chevron-down"></i>
							</label>
						</div>
						<div id="statusBar.format.popup" class="popup hidden"></div>
						<span class="setting__hint"
							>示例：
							<span
								data-setting-preview="statusBar.format"
								data-setting-preview-type="commit"
								data-setting-preview-default="${author}, ${agoOrDate}${' via 'pullRequest}"
							></span>
						</span>
					</div>

					<div class="setting" data-enablement="statusBar.enabled">
						<div class="setting__input">
							<label for="statusBar.alignment">将注解放置在</label>
							<div class="select-container">
								<select id="statusBar.alignment" name="statusBar.alignment" data-setting disabled>
									<option value="left">左侧</option>
									<option value="right">右侧</option>
								</select>
							</div>
						</div>
					</div>

					<div class="setting" data-enablement="statusBar.enabled">
						<div class="setting__input">
							<label class="nowrap" for="statusBar.command">点击时</label>
							<div class="select-container">
								<select id="statusBar.command" name="statusBar.command" data-setting disabled>
									<option value="gitlens.toggleFileBlame">切换文件归属注释</option>
									<option value="gitlens.toggleFileHeatmap">切换文件热力图</option>
									<option value="gitlens.toggleFileChanges">
										切换显示提交之前的文件更改
									</option>
									<option value="gitlens.toggleFileChangesOnly">
										切换显示该提交中的文件更改
									</option>
									<option value="gitlens.toggleCodeLens">切换 Git CodeLens</option>
									<option value="gitlens.diffWithPrevious">
										打开与上一个修订版本的行变更对比
									</option>
									<option value="gitlens.diffWithWorking">
										打开与工作区文件的行变更对比
									</option>
									<option value="gitlens.revealCommitInView">
										在侧边栏中定位该提交
									</option>
									<option value="gitlens.showCommitsInView">搜索该提交</option>
									<option value="gitlens.showQuickCommitDetails">显示该提交的详情</option>
									<option value="gitlens.showQuickCommitFileDetails">
										显示该提交对应文件的详情
									</option>
									<option value="gitlens.showQuickFileHistory">显示当前文件历史</option>
									<option value="gitlens.showQuickRepoHistory">
										显示当前分支历史
									</option>
									<option value="gitlens.openCommitOnRemote">
										在远程服务上打开该提交（如果可用）
									</option>
									<option value="gitlens.copyRemoteCommitUrl">
										将远程提交 URL 复制到剪贴板（如果可用）
									</option>
									<option value="gitlens.openFileOnRemote">
										在远程服务上打开文件修订版本（如果可用）
									</option>
									<option value="gitlens.copyRemoteFileUrl">
										将远程文件修订版本 URL 复制到剪贴板（如果可用）
									</option>
								</select>
							</div>
						</div>
					</div>

					<div class="setting" data-enablement="statusBar.enabled">
						<div class="setting__input">
							<input
								id="statusBar.reduceFlicker"
								name="statusBar.reduceFlicker"
								type="checkbox"
								data-setting
								disabled
							/>
							<label for="statusBar.reduceFlicker">更新注释时减少闪烁</label>
						</div>
						<p class="setting__hint">
							避免在切换行时清除上一条归属信息，以减少状态栏闪烁
						</p>
					</div>
				</div>
			</div>

			<div class="section__preview">
				<img class="image__preview" src="#{webroot}/media/status-bar.webp" loading="lazy" />
				<img
					class="image__preview--overlay hidden"
					src="#{webroot}/media/status-bar-right+pr.webp"
					data-visibility="statusBar.enabled &amp; statusBar.alignment =right &amp; statusBar.pullRequests.enabled"
					loading="lazy"
				/>
				<img
					class="image__preview--overlay hidden"
					src="#{webroot}/media/status-bar-right.webp"
					data-visibility="statusBar.enabled &amp; statusBar.alignment =right &amp; statusBar.pullRequests.enabled =false"
					loading="lazy"
				/>
				<img
					class="image__preview--overlay hidden"
					src="#{webroot}/media/status-bar-left+pr.webp"
					data-visibility="statusBar.enabled &amp; statusBar.alignment =left &amp; statusBar.pullRequests.enabled"
					loading="lazy"
				/>
				<img
					class="image__preview--overlay hidden"
					src="#{webroot}/media/status-bar-left.webp"
					data-visibility="statusBar.enabled &amp; statusBar.alignment =left &amp; statusBar.pullRequests.enabled =false"
					loading="lazy"
				/>
			</div>
		</div>

		<div class="section__group">
			<p class="section__hint">
				<i class="icon icon__info"></i> 如需更多选项，打开
				<a
					class="command"
					title="打开设置"
					href="command:workbench.action.openSettings?%22gitlens.statusBar%22"
					>设置</a
				>
				并搜索 <b><i>gitlens.statusBar</i></b>
			</p>
		</div>
	</div>
</section>
