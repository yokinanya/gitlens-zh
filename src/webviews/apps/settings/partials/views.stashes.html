<section id="stashes-view" class="section--settings section--collapsible">
	<div class="section__header">
		<h2>
			储藏视图
			<a
				class="link__learn-more"
				title="了解更多"
				href="https://github.com/gitkraken/vscode-gitlens/#stashes-view-"
			>
				<i class="icon icon__info"></i>
			</a>
		</h2>

		<p class="section__header-hint">
			添加一个
			<a class="command command--show-view" title="在侧边栏中显示视图" href="command:gitlens.showStashesView"
				>储藏视图</a
			>
			用于可视化、浏览和管理 Git 储藏
		</p>
	</div>

	<div class="section__collapsible">
		<div class="section__group">
			<div class="section__content">
				<div class="settings settings--fixed ml-1">
					<div class="setting">
						<div class="setting__input">
							<label for="views.stashes.files.layout">文件布局</label>
							<div class="select-container">
								<select id="views.stashes.files.layout" name="views.stashes.files.layout" data-setting>
									<option value="auto">自动</option>
									<option value="list">列表</option>
									<option value="tree">树形</option>
								</select>
							</div>
						</div>
						<p class="setting__hint" data-visibility="views.stashes.files.layout =auto">
							根据每一级嵌套中的文件数量自动选择最合适的布局
						</p>
					</div>

					<div class="setting">
						<div class="setting__input">
							<input
								id="views.stashes.files.compact"
								name="views.stashes.files.compact"
								type="checkbox"
								data-setting
							/>
							<label for="views.stashes.files.compact">使用紧凑文件布局</label>
						</div>
						<p class="setting__hint">使用树形布局时压平不必要的嵌套层级</p>
					</div>

					<div class="setting">
						<div class="setting__input setting__input--format">
							<label for="views.formats.stashes.label">Stash&nbsp;label&nbsp;format</label>
							<input
								id="views.formats.stashes.label"
								name="views.formats.stashes.label"
								type="text"
								placeholder="${message}"
								data-setting
								data-setting-preview
								data-default-value="${message}"
								data-popup-trigger
							/>
							<label for="views.formats.stashes.label" title="查看可用标记">
								<i class="icon icon__chevron-down"></i>
							</label>
						</div>
						<div id="views.formats.stashes.label.popup" class="popup hidden"></div>
						<span class="setting__hint"
							>示例：
							<span
								data-setting-preview="views.formats.stashes.label"
								data-setting-preview-type="commit"
								data-setting-preview-default="${message}"
							></span>
						</span>
					</div>

					<div class="setting">
						<div class="setting__input setting__input--format">
							<label for="views.formats.stashes.description">Stash&nbsp;description&nbsp;format</label>
							<input
								id="views.formats.stashes.description"
								name="views.formats.stashes.description"
								type="text"
								placeholder="${agoOrDate}"
								data-setting
								data-setting-preview
								data-default-value="${agoOrDate}"
								data-popup-trigger
							/>
							<label for="views.formats.stashes.description" title="查看可用标记">
								<i class="icon icon__chevron-down"></i>
							</label>
						</div>
						<div id="views.formats.stashes.description.popup" class="popup hidden"></div>
						<span class="setting__hint"
							>示例：
							<span
								data-setting-preview="views.formats.stashes.description"
								data-setting-preview-type="commit"
								data-setting-preview-default="${agoOrDate}"
							></span>
						</span>
					</div>
				</div>
			</div>

			<div class="section__preview">
				<img
					class="image__preview hidden"
					src="#{webroot}/media/stashes-view-auto.webp"
					data-visibility="views.stashes.files.layout !tree"
					loading="lazy"
				/>
				<img
					class="image__preview hidden"
					src="#{webroot}/media/stashes-view-tree.webp"
					data-visibility="views.stashes.files.layout =tree"
					loading="lazy"
				/>
			</div>
		</div>

		<div class="section__group">
			<p class="section__hint">
				<i class="icon icon__info"></i> 如需更多选项，打开
				<a
					class="command"
					title="打开设置"
					href="command:workbench.action.openSettings?%22gitlens.views.stashes%22"
					>设置</a
				>
				并搜索 <b><i>gitlens.views.stashes</i></b> 或
				<b><i>gitlens.views</i></b>
			</p>
		</div>
	</div>
</section>
