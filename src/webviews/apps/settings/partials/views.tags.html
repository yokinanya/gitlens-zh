<section id="tags-view" class="section--settings section--collapsible">
	<div class="section__header">
		<h2>
			标签视图
			<a
				class="link__learn-more"
				title="了解更多"
				href="https://github.com/gitkraken/vscode-gitlens/#tags-view-"
			>
				<i class="icon icon__info"></i>
			</a>
		</h2>

		<p class="section__header-hint">
			添加一个
			<a class="command command--show-view" title="在侧边栏中显示视图" href="command:gitlens.showTagsView"
				>标签视图</a
			>
			用于可视化、浏览和管理 Git 标签
		</p>
	</div>

	<div class="section__collapsible">
		<div class="section__group">
			<div class="section__content">
				<div class="settings settings--fixed ml-1">
					<div class="setting">
						<div class="setting__input">
							<label for="views.tags.branches.layout">标签布局</label>
							<div class="select-container">
								<select id="views.tags.branches.layout" name="views.tags.branches.layout" data-setting>
									<option value="list">列表</option>
									<option value="tree">树形</option>
								</select>
							</div>
						</div>
					</div>

					<div class="setting">
						<div class="setting__input">
							<label for="sortTagsBy">标签排序</label>
							<div class="select-container">
								<select id="sortTagsBy" name="sortTagsBy" data-setting>
									<option value="date:desc">按最近提交日期降序</option>
									<option value="date:asc">按最近提交日期升序</option>
									<option value="name:asc">按名称升序</option>
									<option value="name:desc">按名称降序</option>
								</select>
							</div>
						</div>
					</div>

					<div class="setting">
						<div class="setting__input">
							<label for="views.tags.files.layout">文件布局</label>
							<div class="select-container">
								<select id="views.tags.files.layout" name="views.tags.files.layout" data-setting>
									<option value="auto">自动</option>
									<option value="list">列表</option>
									<option value="tree">树形</option>
								</select>
							</div>
						</div>
						<p class="setting__hint" data-visibility="views.tags.files.layout =auto">
							根据每一级嵌套中的文件数量自动选择最合适的布局
						</p>
					</div>

					<div class="setting">
						<div class="setting__input">
							<input
								id="views.tags.files.compact"
								name="views.tags.files.compact"
								type="checkbox"
								data-setting
							/>
							<label for="views.tags.files.compact">使用紧凑文件布局</label>
						</div>
						<p class="setting__hint">使用树形布局时压平不必要的嵌套层级</p>
					</div>

					<div class="setting">
						<div class="setting__input">
							<input id="views.tags.avatars" name="views.tags.avatars" type="checkbox" data-setting />
							<label for="views.tags.avatars">使用作者头像</label>
						</div>
					</div>
				</div>
			</div>

			<div class="section__preview">
				<img
					class="image__preview hidden"
					src="#{webroot}/media/tags-view-list.webp"
					data-visibility="views.tags.branches.layout !tree"
					loading="lazy"
				/>
				<img
					class="image__preview hidden"
					src="#{webroot}/media/tags-view-tree.webp"
					data-visibility="views.tags.branches.layout =tree"
					loading="lazy"
				/>
			</div>
		</div>

		<div class="section__group">
			<p class="section__hint">
				<i class="icon icon__info"></i> 如需更多选项，打开
				<a
					class="command"
					title="打开设置"
					href="command:workbench.action.openSettings?%22gitlens.views.tags%22"
					>设置</a
				>
				并搜索 <b><i>gitlens.views.tags</i></b> 或
				<b><i>gitlens.views</i></b>
			</p>
		</div>
	</div>
</section>
