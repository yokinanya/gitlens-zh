<template id="state:verify-email">
	<section>
		<h3>请验证你的邮箱</h3>
		<p>要使用 GitLens+ 功能，请先验证你创建账户时使用的邮箱。</p>
		<vscode-button data-action="command:gitlens.plus.resendVerification">重新发送验证邮件</vscode-button>
		<vscode-button data-action="command:gitlens.plus.validate">刷新验证状态</vscode-button>
	</section>
</template>
