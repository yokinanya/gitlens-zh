<template id="state:free">
	<section>
		<h3>认识 GitLens+</h3>
		<p>
			<a title="了解 GitLens+ 功能" href="command:gitlens.plus.learn">GitLens+</a>
			提供一组全新且完全可选的功能。使用免费账户登录后，你可以进一步扩展当前的 GitLens 使用体验。
		</p>
		<p>
			<i class="codicon codicon-info"></i>&nbsp;其他 GitLens 功能始终可在无账户的情况下使用，并会持续演进与投入。
		</p>
		<vscode-button data-action="command:gitlens.plus.startPreviewTrial">立即试用 GitLens+ 功能</vscode-button>
		<p>
			无需账户即可试用
			<a title="了解 GitLens+ 功能" href="command:gitlens.plus.learn">GitLens+ 功能</a>
			3 天，在公共和私有仓库中都可体验；或者直接
			<a title="登录 GitLens+" href="command:gitlens.plus.loginOrSignUp">登录</a>
			以便在公共仓库中持续使用。
		</p>
		<p style="margin-bottom: 1rem">首批 GitLens+ 新功能包括可视化文件历史和工作树。</p>
		<h4>可视化文件历史</h4>
		<img
			class="image--preview"
			src="#{root}/images/docs/visual-file-history-hover.png"
			alt="可视化文件历史截图"
		/>
		<p class="feature-desc">
			<a
				title="了解可视化文件历史"
				href="command:gitlens.openWalkthrough?%22gitlens.plus%7Cgitlens.plus.visualFileHistory%22"
				>可视化文件历史</a
			>
			可让你快速查看文件的演变过程，包括何时发生更改、更改规模以及由谁完成。
		</p>
		<h4>工作树</h4>
		<img class="image--preview" src="#{root}/images/docs/worktrees-view.png" alt="工作树截图" />
		<p class="feature-desc">
			<a
				title="了解工作树"
				href="command:gitlens.openWalkthrough?%22gitlens.plus%7Cgitlens.plus.worktrees%22"
				>工作树</a
			>
			让你能够轻松同时处理同一仓库的不同分支。
		</p>
	</section>
</template>
