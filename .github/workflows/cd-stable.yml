name: Publish Stable

on:
    push:
        tags:
            - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
    workflow_dispatch:
        inputs:
            release_tag:
                description: 'Release tag to publish, e.g. v16.2.1'
                required: true

jobs:
    build:
        name: Publish Stable
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v2
              with:
                  ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.release_tag) || github.ref }}
            - name: Setup node
              uses: actions/setup-node@v2
              with:
                  node-version: '14'
            - name: Setup Environment
              run: |
                  node -e "console.log('PACKAGE_VERSION=' + require('./package.json').version + '\nPACKAGE_NAME=' + require('./package.json').name + '-' + require('./package.json').version)" >> $GITHUB_ENV
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    echo "RELEASE_TAG=${{ github.event.inputs.release_tag }}" >> $GITHUB_ENV
                  else
                    echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
                  fi
            - name: Verify versions
              run: node -e "if ('v' + '${{ env.PACKAGE_VERSION }}' !== '${{ env.RELEASE_TAG }}') { console.log('::error' + 'Version Mismatch. v' + '${{ env.PACKAGE_VERSION }}', '${{ env.RELEASE_TAG }}'); throw Error('Version Mismatch')} "
            - name: Install
              run: yarn
            - name: Package extension
              run: yarn run package
            - name: Publish Extension
              continue-on-error: true
              run: yarn vsce publish --yarn --packagePath ./${{ env.PACKAGE_NAME }}.vsix -p ${{ secrets.GITLENS_VSCODE_MARKETPLACE_PAT }}
            - name: Generate Changelog
              id: changelog
              uses: mindsers/changelog-reader-action@v2
              with:
                  version: ${{ env.PACKAGE_VERSION }}
                  path: ./CHANGELOG.md
            - name: Create GitHub release
              id: create_release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ env.RELEASE_TAG }}
                  release_name: v${{ env.PACKAGE_VERSION }}
                  body: ${{ steps.changelog.outputs.changes }}
                  draft: false
                  prerelease: false
            - name: Upload GitHub release
              id: upload-release-asset
              uses: actions/upload-release-asset@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  upload_url: ${{ steps.create_release.outputs.upload_url }}
                  asset_path: ./${{ env.PACKAGE_NAME }}.vsix
                  asset_name: ${{ env.PACKAGE_NAME }}.vsix
                  asset_content_type: application/zip
